name: Build and Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Run Tests
      run: mvn -B test --file pom.xml

    - name: Build with Maven
      run: mvn -B package -DskipTests --file pom.xml

    - name: Check target contents (for debug)
      run: |
        if [ ! -d "core/target" ]; then
          echo "Error: build failed, core/target directory not found"
          exit 1
        fi
        echo "core/target directory contents:"
        ls -l core/target

    - name: Get version and timestamp
      id: version
      run: |
        VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout --file pom.xml)
        TIMESTAMP=$(date -u +"%Y%m%d-%H%M%S")
        RELEASE_TAG="v${VERSION}-${TIMESTAMP}"
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
        echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT
        echo "Release tag will be: $RELEASE_TAG"

    - name: Rename Artifact with version
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        TIMESTAMP="${{ steps.version.outputs.timestamp }}"
        BUILT_JAR=$(find core/target -name "IronDiscipline-dev-*.jar" ! -name "*latest.jar" -type f -print -quit)
        if [ -z "$BUILT_JAR" ]; then
          echo "Error: No built JAR found after build. Check if Maven created the artifact."
          exit 1
        fi
        mv "$BUILT_JAR" "core/target/IronDiscipline-dev-${VERSION}-${TIMESTAMP}.jar"
        cp "core/target/IronDiscipline-dev-${VERSION}-${TIMESTAMP}.jar" "core/target/IronDiscipline-dev-latest.jar"
        ls -l core/target

    - name: Create Versioned Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.version.outputs.release_tag }}
        name: IronDiscipline-dev ${{ steps.version.outputs.version }} (${{ steps.version.outputs.timestamp }})
        body: |
          ## IronDiscipline-dev ビルド
          **バージョン:** ${{ steps.version.outputs.version }}
          **ビルド日時:** ${{ steps.version.outputs.timestamp }} UTC

          LuckPermsに依存しない高速版です。

          ### 通常版からの移行
          ```
          /irondev migrate
          ```

          ### 変更履歴
          コミット: ${{ github.sha }}
        files: core/target/IronDiscipline-dev-${{ steps.version.outputs.version }}-${{ steps.version.outputs.timestamp }}.jar
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Update Latest Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: latest
        name: Latest Build (LuckPerms非依存版)
        body: |
          ## IronDiscipline-dev 最新ビルド
          **最新バージョン:** ${{ steps.version.outputs.version }}
          **ビルド日時:** ${{ steps.version.outputs.timestamp }} UTC

          このリリースは常に最新のビルドを指します。
          特定のバージョンが必要な場合は、タイムスタンプ付きリリースをご利用ください。

          LuckPermsに依存しない高速版です。

          ### 通常版からの移行
          ```
          /irondev migrate
          ```
        files: core/target/IronDiscipline-dev-latest.jar
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
